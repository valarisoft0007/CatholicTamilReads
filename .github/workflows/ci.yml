name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      ADMIN_PASSWORD: test-password
      ADMIN_JWT_SECRET: test-secret-key-for-ci
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-test-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (validation, utilities, API routes)
        run: npm run test:run

  integration-tests:
    name: Integration Tests (Firebase Emulator)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run Firestore integration tests with emulator
        run: |
          firebase --config firebase.test.json emulators:exec \
            --only firestore,auth \
            --project demo-test-project \
            "npm run test:integration"
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
